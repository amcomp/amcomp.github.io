<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Playwrite+HR:wght@100..400&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <title>Home</title>
    <link rel="icon" type="image/x-icon" href="/images/Cloudfav.png">

    <style>
        body {
            font-family: 'Josefin Sans', sans-serif;
        }

        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1.5s ease-out, transform 1.5s ease-out;
        }
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="p-3 m-0 border-0 bg-dark text-white">
    <!-- Appbar/Navigation bar-->
    <nav class="navbar navbar-expand-lg bg-primary rounded">
        <div class="container-fluid">
            <a class="navbar-brand" href="/index.html">Home</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="/pages/blog.html">Blog</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/pages/about.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- Appbar/Navigation bar-->

    <!--Content-->
    <div class="d-flex justify-content-center align-items-center" style="min-height: 85vh;">
        <div class="container text-center">
            <h1 class="fade-in">Mathew Titus | System Administrator</h1>
        </div>
    </div>
    <!--Content-->

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const element = document.querySelector('.fade-in');
            element.classList.add('visible');
        });
    </script>
</body>

</html>
